<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle · Estoque &amp; Puxada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ================= TOKENS ================= */
:root{
  --bg:#F2F3F7;
  --panel:#FFFFFF;
  --sidebar:#12182B;
  --sidebar-soft:#1B2440;
  --sidebar-text:#AEB6D4;
  --sidebar-text-active:#FFFFFF;
  --ink:#171B2C;
  --muted:#6B7280;
  --border:#E4E6EE;
  --brand:#E8A33D;
  --stage-comercial:#E8A33D;
  --stage-aprov:#2A9D8F;
  --stage-puxada:#3D5A80;
  --success:#3F8F5F;
  --success-soft:#E8F5EC;
  --danger:#C1444D;
  --danger-soft:#FBEAEA;
  --warn-soft:#FBF1DD;
  --info-soft:#E8EEF5;
  --radius:12px;
  --shadow:0 1px 2px rgba(18,24,43,.06), 0 8px 24px rgba(18,24,43,.06);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
.mono{font-family:var(--font-mono);}
a{color:inherit;}

/* ================= LAYOUT ================= */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:252px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-text);
  display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 22px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--stage-comercial),var(--stage-puxada));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#12182B;font-size:15px;flex-shrink:0;}
.brand-text h1{font-size:15px;color:#fff;line-height:1.2;}
.brand-text span{font-size:11px;color:var(--sidebar-text);letter-spacing:.04em;text-transform:uppercase;}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
  color:var(--sidebar-text);background:transparent;border:none;text-align:left;font-size:13.5px;font-weight:500;
  transition:background .12s,color .12s;
}
.nav-item:hover{background:var(--sidebar-soft);color:#fff;}
.nav-item.active{background:var(--sidebar-soft);color:var(--sidebar-text-active);box-shadow:inset 3px 0 0 var(--brand);}
.nav-icon{width:18px;text-align:center;font-size:14px;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
.session-card{padding:10px 12px;border-radius:9px;background:var(--sidebar-soft);margin-bottom:8px;}
.session-card .who{font-size:13px;font-weight:600;color:#fff;}
.session-card .role{font-size:11.5px;color:var(--sidebar-text);margin-top:2px;}
.btn-logout{width:100%;padding:9px 12px;border-radius:9px;background:transparent;border:1px solid rgba(255,255,255,.14);color:var(--sidebar-text);font-size:12.5px;font-weight:500;}
.btn-logout:hover{background:rgba(255,255,255,.06);color:#fff;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;padding:16px 28px;
  background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
}
.topbar h2{font-size:19px;}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.content{padding:26px 28px 60px;flex:1;}

@media (max-width:900px){
  .shell{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:column;padding:14px 12px;}
  .nav{flex-direction:row;overflow-x:auto;gap:6px;}
  .nav-item{white-space:nowrap;}
  .sidebar-footer{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;}
  .session-card{margin-bottom:0;flex:1;}
  .content{padding:18px 16px 48px;}
  .topbar{padding:14px 16px;}
}

/* ================= COMMON UI ================= */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.section-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11.5px;font-weight:600;letter-spacing:.01em;}
.pill-comercial{background:var(--warn-soft);color:#8A5A17;}
.pill-puxada{background:var(--info-soft);color:#2C4763;}
.pill-success{background:var(--success-soft);color:var(--success);}
.pill-danger{background:var(--danger-soft);color:var(--danger);}
.btn{padding:9px 16px;border-radius:8px;border:1px solid transparent;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:filter .12s,transform .05s;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{filter:brightness(1.2);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{filter:brightness(1.08);}
.btn-danger{background:#fff;color:var(--danger);border-color:var(--danger-soft);}
.btn-danger:hover{background:var(--danger-soft);}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-block{width:100%;justify-content:center;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select,.field textarea{
  padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--stage-puxada);box-shadow:0 0 0 3px rgba(61,90,128,.12);}
.field textarea{resize:vertical;min-height:64px;}
.hint{font-size:12px;color:var(--muted);margin-top:2px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:640px){.grid-2{grid-template-columns:1fr;}}
.empty-state{padding:40px 20px;text-align:center;color:var(--muted);}
.empty-state .big{font-size:28px;margin-bottom:8px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--border);}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13.5px;}
tr:last-child td{border-bottom:none;}
.table-wrap{overflow-x:auto;}
.badge-count{background:var(--ink);color:#fff;font-size:11px;padding:1px 7px;border-radius:99px;margin-left:auto;}

/* toast */
#toast-container{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 16px;border-radius:9px;background:var(--ink);color:#fff;font-size:13.5px;box-shadow:var(--shadow);max-width:340px;animation:slidein .18s ease-out;}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}
@keyframes slidein{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(17,20,33,.55);display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:200;overflow-y:auto;}
.modal-box{background:#fff;border-radius:14px;max-width:560px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-close{position:absolute;top:16px;right:18px;background:transparent;border:none;font-size:18px;color:var(--muted);}

/* login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 20%,#1B2440,#0C1020 70%);padding:20px;}
.login-card{background:#fff;border-radius:18px;padding:38px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.login-card .brand-mark{margin:0 auto 16px;}
.login-card h1{text-align:center;font-size:20px;margin-bottom:4px;}
.login-card .subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.role-btn{padding:14px 10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;text-align:center;font-size:12.5px;font-weight:600;color:var(--muted);}
.role-btn .ic{font-size:19px;display:block;margin-bottom:6px;}
.role-btn.selected{border-color:var(--ink);background:var(--bg);color:var(--ink);}
.config-warning{background:var(--warn-soft);border:1px solid #F0D9A6;border-radius:12px;padding:18px 22px;max-width:640px;margin:60px auto;line-height:1.6;font-size:14px;}
.config-warning code{background:#fff;border:1px solid var(--border);padding:2px 6px;border-radius:5px;font-family:var(--font-mono);font-size:12.5px;}

/* kanban */
.kanban-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;}
.kanban-toolbar input,.kanban-toolbar select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;}
.kanban-scroll{overflow-x:auto;padding-bottom:6px;}
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(272px,1fr);gap:16px;align-items:start;}
.kanban-col{background:#EAEBF1;border-radius:14px;padding:12px;min-height:120px;}
.kanban-col-head{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;font-size:13px;font-weight:700;}
.kanban-col-head .dot{width:9px;height:9px;border-radius:99px;}
.kcard{background:#fff;border-radius:11px;padding:12px 13px;margin-bottom:10px;box-shadow:0 1px 3px rgba(18,24,43,.08);border-left:3px solid var(--border);cursor:pointer;transition:transform .08s;}
.kcard:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(18,24,43,.12);}
.kcard .prod{font-size:13.5px;font-weight:600;margin-bottom:2px;}
.kcard .cod{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px;}
.kcard .qtd{font-family:var(--font-mono);font-size:17px;font-weight:600;}
.kcard .meta{font-size:11.5px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;gap:6px;}

/* timeline */
.timeline{list-style:none;margin:0;padding:0;border-left:2px solid var(--border);padding-left:16px;}
.timeline li{position:relative;padding-bottom:16px;}
.timeline li::before{content:'';position:absolute;left:-21px;top:3px;width:9px;height:9px;border-radius:99px;background:var(--stage-puxada);}
.timeline .ev-tipo{font-size:13px;font-weight:600;}
.timeline .ev-meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
.timeline .ev-detalhe{font-size:12.5px;color:var(--ink);margin-top:4px;}

/* import */
.import-drop{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;color:var(--muted);font-size:13.5px;}
.mapping-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.mapping-row:last-child{border-bottom:none;}
.mapping-row label{font-size:12.5px;font-weight:600;color:var(--ink);}
.mapping-row select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;}
.preview-table{font-size:12px;}
.preview-table th,.preview-table td{padding:6px 8px;}

.qty-input{width:100%;max-width:140px;}
.approve-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.approve-form .field{margin-bottom:0;flex:1;min-width:130px;}
.approve-actions{display:flex;gap:8px;}
.queue-item{padding:16px;border:1px solid var(--border);border-radius:11px;margin-bottom:14px;background:#fff;}
.queue-item-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.queue-item .prod-name{font-size:14.5px;font-weight:600;}
.queue-item .prod-cod{font-size:11.5px;color:var(--muted);font-family:var(--font-mono);}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media (max-width:760px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.stat-card .n{font-family:var(--font-mono);font-size:22px;font-weight:600;}
.stat-card .l{font-size:11.5px;color:var(--muted);margin-top:2px;}
.search-results{border:1px solid var(--border);border-radius:8px;margin-top:6px;max-height:220px;overflow-y:auto;background:#fff;}
.search-results .sr-item{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.search-results .sr-item:last-child{border-bottom:none;}
.search-results .sr-item:hover{background:var(--bg);}
.search-results .sr-item small{color:var(--muted);display:block;font-size:11px;margin-top:2px;}
.selected-product-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
</style>
</head>
<body>

<div id="toast-container"></div>
<div id="app"></div>
<div id="modal-root"></div>

<script>
/* =====================================================================
   CONFIGURAÇÃO — troque pelos dados do SEU projeto Supabase
   (Painel Supabase > seu projeto > Settings > API)
   ===================================================================== */
const SUPABASE_URL = 'https://awmmaosiadxhwthnoyxl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nhZ1eSr5LOWW2XFGcCRiJg_y3ZtoT3T';

const SENHAS = {
  comercial: '3306',
  aprovador_comercial: '0000',
  aprovador_puxada: '9999'
};

const ROLE_LABEL = {
  comercial: 'Comercial',
  aprovador_comercial: 'Aprovador Comercial',
  aprovador_puxada: 'Aprovador Puxada',
  visualizacao: 'Visualização'
};

const OPERACOES = ['Virginia Maringá', 'Virginia Guarapuava', 'Virginia Ponta Grossa', 'Virginia Norte Pioneiro'];

const STATUS_INFO = {
  pendente_comercial:  {label:'Aguardando Aprovação Comercial', color:'var(--stage-comercial)', pill:'pill-comercial'},
  pendente_puxada:     {label:'Aguardando Aprovação Puxada',    color:'var(--stage-puxada)',    pill:'pill-puxada'},
  aprovado:            {label:'Programado',                    color:'var(--success)',          pill:'pill-success'},
  rejeitado_comercial: {label:'Rejeitado (Comercial)',          color:'var(--danger)',           pill:'pill-danger'},
  rejeitado_puxada:    {label:'Rejeitado (Puxada)',             color:'var(--danger)',           pill:'pill-danger'}
};

const TABS = [
  {id:'produtos',       label:'Produtos',           icon:'📦', roles:['comercial','aprovador_comercial','aprovador_puxada','visualizacao']},
  {id:'nova',           label:'Nova Solicitação',   icon:'➕', roles:['comercial']},
  {id:'fila_comercial', label:'Aprovar (Comercial)',icon:'✅', roles:['aprovador_comercial']},
  {id:'fila_puxada',    label:'Aprovar (Puxada)',   icon:'🚚', roles:['aprovador_puxada']},
  {id:'gestao',         label:'Gestão / Kanban',    icon:'📊', roles:['comercial','aprovador_comercial','aprovador_puxada','visualizacao']}
];

/* ===================== ESTADO ===================== */
let sb = null;
const state = {
  session: null,          // {role, nome}
  tab: 'produtos',
  produtos: [],
  solicitacoes: [],
  loading: false,
  operacaoAtual: '',      // '' = todas as operações
  produtosBusca: '',
  produtosCategoria: '',  // '' = todas as categorias
  produtosSort: {campo:'nome', direcao:'asc'},
  formNova: {produtoId:null, busca:''},
  gestaoFiltro: {busca:'', status:'todos', somenteMinhas:false},
  importState: null       // {rows(raw), headers, mapping, parsedRows}
};

/* ===================== UTIL ===================== */
function normalizarTexto(s){
  return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function parseNumeroBR(v){
  if(v===null||v===undefined||v==='') return 0;
  if(typeof v==='number') return v;
  let s=String(v).trim();
  if(/,\d{1,2}$/.test(s)) s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function formatNumero(n){
  const v=Number(n||0);
  return v.toLocaleString('pt-BR',{maximumFractionDigits:2});
}
function formatDateBR(d){
  if(!d) return '—';
  const dt = new Date(d.length===10 ? d+'T00:00:00' : d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR');
}
function formatDateTimeBR(d){
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),260); }, 3600);
}
function usuarioDigitando(){
  // Enquanto o foco estiver em qualquer campo de texto, uma atualização em
  // segundo plano (realtime) não deve reconstruir a tela e derrubar o foco.
  const el = document.activeElement;
  if(!el) return false;
  return el.tagName==='INPUT' || el.tagName==='TEXTAREA';
}

/* ===================== CAMADA DE DADOS (SUPABASE) ===================== */
async function fetchTudoPaginado(construirQuery){
  // O Supabase limita cada consulta a um número máximo de linhas (por padrão
  // 1000). Para tabelas que passam disso, buscamos em páginas até não sobrar
  // mais nada, em vez de confiar numa única consulta.
  const TAMANHO_PAGINA = 1000;
  let inicio = 0;
  let tudo = [];
  while(true){
    const {data, error} = await construirQuery().range(inicio, inicio + TAMANHO_PAGINA - 1);
    if(error) return {data:null, error};
    tudo = tudo.concat(data || []);
    if(!data || data.length < TAMANHO_PAGINA) break;
    inicio += TAMANHO_PAGINA;
  }
  return {data:tudo, error:null};
}
async function loadProdutos(){
  const {data, error} = await fetchTudoPaginado(()=> sb.from('produtos').select('*').order('nome', {ascending:true}));
  if(error){ toast('Erro ao carregar produtos: '+error.message, 'error'); return; }
  state.produtos = data || [];
}
async function loadSolicitacoes(){
  const {data, error} = await fetchTudoPaginado(()=> sb.from('solicitacoes').select('*').order('created_at', {ascending:false}));
  if(error){ toast('Erro ao carregar solicitações: '+error.message, 'error'); return; }
  state.solicitacoes = data || [];
}
async function loadHistorico(solicitacaoId){
  const {data, error} = await sb.from('historico_eventos').select('*').eq('solicitacao_id', solicitacaoId).order('created_at', {ascending:true});
  if(error){ toast('Erro ao carregar histórico: '+error.message, 'error'); return []; }
  return data || [];
}
async function registrarEvento(solicitacaoId, tipo, usuario, detalhe){
  const {error} = await sb.from('historico_eventos').insert({solicitacao_id:solicitacaoId, tipo_evento:tipo, usuario, detalhe});
  if(error) console.error('Falha ao registrar evento no histórico:', error.message);
}
async function refreshData(opts){
  opts = opts || {};
  if(state.loading){
    // Já existe uma atualização em andamento: não descarta, apenas agenda
    // para rodar de novo assim que a atual terminar (evita perder um refresh).
    state.refreshPendente = state.refreshPendente || opts;
    return;
  }
  state.loading = true;
  try{
    await Promise.all([loadProdutos(), loadSolicitacoes()]);
    if(opts.force || !usuarioDigitando()) render();
  } finally {
    state.loading = false;
    if(state.refreshPendente){
      const pendente = state.refreshPendente;
      state.refreshPendente = null;
      refreshData(pendente);
    }
  }
}

async function criarSolicitacao(produto, quantidade, observacao){
  const {data, error} = await sb.from('solicitacoes').insert({
    produto_id: produto.id,
    codigo_produto: produto.codigo,
    nome_produto: produto.nome,

async function importarProdutos(rows, limparAntes){

    const operacoes = Array.from(new Set(rows.map(r=>r.operacao)));

  }
  const nowIso = new Date().toISOString();
  const payload = rows.map(r=>({...r, updated_at:nowIso}));
  const {data, error} = await sb.from('produtos').upsert(payload, {onConflict:'codigo,operacao'}).select();

let refreshDebounceTimer = null;

function initRealtime(){
  // Remove qualquer canal antigo antes de recriar — evita o erro de tentar

  sb.getChannels().forEach(ch => sb.removeChannel(ch));

/* ===================== IMPORTAÇÃO DE PLANILHA ===================== */
const CAMPO_ALIASES = {
  codigo:       ['codigo produto','codigo do produto','codigo','sku','cod produto','cod. produto'],
  nome:         ['nome produto','nome do produto','produto','descricao','descricao produto'],
  categoria:    ['categoria produto','categoria'],
  segmento:     ['segmento produto','segmento'],
  embalagem:    ['embalagem produto','embalagem','tipo de embalagem'],
  operacao:     ['operacao','operacao produto','unidade','revenda','filial','regional'],
  estoque:      ['estoque','estoque atual','estoque un','estoque unidades'],
  estoque_hl:   ['estoque hl','estoque (hl)','estoque em hl'],
  media_vendas: ['media de vendas','media vendas','media de venda','media mensal de vendas'],
  dias_estoque: ['dias em estoque','dias de estoque','dias estoque','giro','giro em dias']
};
const CAMPO_LABEL = {
  codigo:'Código Produto', nome:'Nome Produto', categoria:'Categoria Produto', segmento:'Segmento Produto',
  embalagem:'Embalagem Produto', operacao:'Operação', estoque:'Estoque', estoque_hl:'Estoque HL', media_vendas:'Média de Vendas', dias_estoque:'Dias em Estoque'
};
function normalizarOperacao(raw){
  const q = normalizarTexto(raw);
  if(!q) return '';
  const achada = OPERACOES.find(op => normalizarTexto(op)===q || normalizarTexto(op).includes(q) || q.includes(normalizarTexto(op)));
  return achada || String(raw).trim();
}
function detectarMapeamento(headers){
  const norm = headers.map(normalizarTexto);
  const mapeamento = {};
  for(const campo in CAMPO_ALIASES){
    let idx = norm.findIndex(h => CAMPO_ALIASES[campo].includes(h));
    if(idx===-1) idx = norm.findIndex(h => CAMPO_ALIASES[campo].some(a=>h.includes(a)));
    mapeamento[campo] = idx;
  }
  return mapeamento;
}
function handleArquivoSelecionado(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
      if(!rows.length){ toast('A planilha parece estar vazia', 'error'); return; }
      const headers = rows[0].map(h=>String(h||''));
      const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim()!==''));
      const mapping = detectarMapeamento(headers);
      state.importState = {headers, dataRows, mapping};
      renderContent();
    }catch(err){
      toast('Não foi possível ler o arquivo: '+err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}
function construirLinhasImportacao(){
  const {dataRows, mapping} = state.importState;
  const detalhesIgnoradas = [];
  const porChave = new Map();
  let duplicadas = 0;
  dataRows.forEach((row, idx)=>{
    const numeroLinha = idx + 2; // +1 para sair do índice 0, +1 pela linha de cabeçalho
    const get = (campo)=> mapping[campo]>=0 ? row[mapping[campo]] : '';
    const codigo = String(get('codigo')||'').trim();
    const nome = String(get('nome')||'').trim();
    const operacao = normalizarOperacao(get('operacao'));
    const faltando = [];
    if(!codigo) faltando.push('Código Produto');
    if(!nome) faltando.push('Nome Produto');
    if(!operacao) faltando.push('Operação');
    if(faltando.length){
      detalhesIgnoradas.push({linha:numeroLinha, motivo:'Faltando: '+faltando.join(', ')});
      return;
    }
    const linhaObj = {
      codigo, nome, operacao,
      categoria: String(get('categoria')||'').trim() || null,
      segmento: String(get('segmento')||'').trim() || null,
      embalagem: String(get('embalagem')||'').trim() || null,
      estoque: parseNumeroBR(get('estoque')),
      estoque_hl: parseNumeroBR(get('estoque_hl')),
      media_vendas: parseNumeroBR(get('media_vendas')),
      dias_estoque: parseNumeroBR(get('dias_estoque'))
    };
    const chave = normalizarTexto(codigo)+'||'+normalizarTexto(operacao);
    if(porChave.has(chave)) duplicadas++;
    porChave.set(chave, linhaObj); // se repetir código+operação, fica a última ocorrência
  });
  return {linhas: Array.from(porChave.values()), ignoradas: detalhesIgnoradas.length, duplicadas, detalhesIgnoradas};
}
function baixarModeloCSV(){
  const headerRow = Object.values(CAMPO_LABEL).join(';');
  const exemplo = ['10012345','Cerveja Brahma Duplo Malte 350ml','Cerveja','Core','Lata 350ml','Virginia Maringá','1200','42,5','380','3,2'].join(';');
  const blob = new Blob(['\uFEFF'+headerRow+'\n'+exemplo], {type:'text/csv;charset=utf-8;'});

function produtosFiltrados(){

    if(q && !normalizarTexto([p.codigo,p.nome,p.categoria,p.segmento].join(' ')).includes(q)) return false;
    return true;
  });
  const {campo, direcao} = state.produtosSort;
  const numericos = new Set(['estoque','estoque_hl','media_vendas','dias_estoque']);
  lista = lista.slice().sort((a,b)=>{
    let r;
    if(numericos.has(campo)) r = (Number(a[campo])||0) - (Number(b[campo])||0);
    else r = String(a[campo]||'').localeCompare(String(b[campo]||''), 'pt-BR', {sensitivity:'base'});
    return direcao==='asc' ? r : -r;
  });
  return lista;
}

function renderResultadosBuscaNova(){
  const box = document.getElementById('resultados-busca-nova');
  const q = normalizarTexto(state.formNova.busca);
  if(box){
    if(!q){
      box.style.display='none'; box.innerHTML='';
    } else {
      const lista = state.produtos
        .filter(p => !state.operacaoAtual || p.operacao===state.operacaoAtual)
        .filter(p => normalizarTexto(p.codigo+' '+p.nome).includes(q))
        .slice(0,8);
      if(!lista.length){
        box.style.display='block';
        box.innerHTML = `<div class="sr-item">Nenhum produto encontrado</div>`;
      } else {
        box.style.display='block';
        box.innerHTML = lista.map(p=>`
          <div class="sr-item" data-action="selecionar-produto-nova" data-id="${p.id}">
            ${esc(p.nome)}<small>${esc(p.codigo)} · ${esc(p.operacao||'—')} · Estoque: ${formatNumero(p.estoque)}</small>
          </div>`).join('');
      }
    }
  }
  // O formulário precisa ser vinculado sempre, independente de ter texto na
  // busca — antes isso ficava preso dentro do "if" acima e, ao limpar a busca
  // após escolher um produto, o botão "Enviar" parava de funcionar de vez.
  const form = document.getElementById('form-nova-solicitacao');
  if(form && !form.dataset.bound){
    form.dataset.bound = '1';
    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const produto = state.produtos.find(pp=>pp.id===state.formNova.produtoId);
      const qtd = parseFloat(document.getElementById('nova-qtd').value);
      const obs = document.getElementById('nova-obs').value;
      if(!produto || !qtd || qtd<=0){ toast('Informe uma quantidade válida', 'error'); return; }
      criarSolicitacao(produto, qtd, obs);
    });
  }
}

function solicitacoesFiltradasGestao(){
  const {busca, status, somenteMinhas} = state.gestaoFiltro;
  const q = normalizarTexto(busca);
  return state.solicitacoes.filter(s=>{
    if(state.operacaoAtual && s.operacao!==state.operacaoAtual) return false;
    if(q && !normalizarTexto(s.nome_produto+' '+s.codigo_produto+' '+s.solicitante_nome).includes(q)) return false;
    if(status==='rejeitado' && !s.status.startsWith('rejeitado')) return false;
    if(status!=='todos' && status!=='rejeitado' && s.status!==status) return false;
    if(somenteMinhas && s.solicitante_nome!==state.session.nome) return false;
    return true;
  });
}

/* ===================== EVENTOS (DELEGAÇÃO) ===================== */
document.addEventListener('click', async (e)=>{
  const roleBtn = e.target.closest('.role-btn');
  if(roleBtn){
    loginSelectedRole = roleBtn.dataset.role;
    renderLogin();
    return;
  }
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id ? Number(btn.dataset.id) : null;

  if(action==='ir-tab'){ state.tab = btn.dataset.tab; renderContent(); highlightNav(); }
  else if(action==='ordenar-produtos'){
    const campo = btn.dataset.campo;
    if(state.produtosSort.campo===campo) state.produtosSort.direcao = state.produtosSort.direcao==='asc' ? 'desc' : 'asc';
    else state.produtosSort = {campo, direcao:'asc'};
    renderContent();
  }
  else if(action==='logout'){ fazerLogout(); }
  else if(action==='atualizar'){ await refreshData({force:true}); toast('Atualizado', 'success'); }
  else if(action==='abrir-importar'){ triggerFileInput(); }
  else if(action==='cancelar-importacao'){ state.importState=null; renderContent(); }
  else if(action==='baixar-modelo'){ baixarModeloCSV(); }
  else if(action==='confirmar-importacao'){
    const {linhas} = construirLinhasImportacao();
    if(!linhas.length){ toast('Nenhuma linha válida para importar', 'error'); return; }
    const checkboxLimpar = document.getElementById('import-limpar-antes');
    const limparAntes = checkboxLimpar ? checkboxLimpar.checked : false;
    if(limparAntes){
      const operacoes = Array.from(new Set(linhas.map(l=>l.operacao)));
      if(!confirm(`Isso vai APAGAR todos os produtos já cadastrados em: ${operacoes.join(', ')}\n\ne substituir pelos ${linhas.length} produto(s) desta planilha. Confirma?`)) return;
    }
    await importarProdutos(linhas, limparAntes);
    renderContent();
  }
  else if(action==='solicitar-produto'){
    state.formNova = {produtoId:id, busca:''};
    state.tab = 'nova';
    renderContent(); highlightNav();
  }
  else if(action==='selecionar-produto-nova'){
    state.formNova.produtoId = id;
    state.formNova.busca = '';
    renderContent();
  }
  else if(action==='aprovar-comercial'){
    const sol = state.solicitacoes.find(s=>s.id===id);
    const qtd = parseFloat(document.getElementById('qtd-com-'+id).value);
    const obs = document.getElementById('obs-com-'+id).value;
    if(!qtd || qtd<=0){ toast('Informe uma quantidade válida', 'error'); return; }
    if(qtd > sol.quantidade_solicitada){ toast('A quantidade aprovada não pode ser maior que a solicitada', 'error'); return; }
    await aprovarComercial(sol, qtd, obs);
  }
  else if(action==='rejeitar-comercial'){
    const sol = state.solicitacoes.find(s=>s.id===id);
    const obs = document.getElementById('obs-com-'+id).value;
    if(!confirm('Confirma a rejeição desta solicitação?')) return;
    await rejeitarComercial(sol, obs);
  }
  else if(action==='aprovar-puxada'){
    const sol = state.solicitacoes.find(s=>s.id===id);
    const qtd = parseFloat(document.getElementById('qtd-pux-'+id).value);
    const prazo = document.getElementById('prazo-pux-'+id).value;
    const obs = document.getElementById('obs-pux-'+id).value;
    if(!qtd || qtd<=0){ toast('Informe uma quantidade válida', 'error'); return; }
    if(qtd > sol.quantidade_aprovada_comercial){ toast('A quantidade não pode ser maior que a aprovada pelo Comercial', 'error'); return; }
    if(!prazo){ toast('Informe o prazo de puxada', 'error'); return; }
    await aprovarPuxada(sol, qtd, prazo, obs);
  }
  else if(action==='rejeitar-puxada'){
    const sol = state.solicitacoes.find(s=>s.id===id);
    const obs = document.getElementById('obs-pux-'+id).value;
    if(!confirm('Confirma a rejeição desta solicitação?')) return;
    await rejeitarPuxada(sol, obs);
  }
  else if(action==='ver-detalhe'){ await abrirDetalheSolicitacao(id); }
  else if(action==='fechar-modal'){ fecharModal(); }
});

document.addEventListener('change', (e)=>{
  if(e.target.classList && e.target.classList.contains('mapping-select')){
    const campo = e.target.dataset.campo;
    state.importState.mapping[campo] = Number(e.target.value);
    renderContent();
  }
  if(e.target.id==='filtro-status-gestao'){ state.gestaoFiltro.status = e.target.value; renderKanbanBoard(); }
  if(e.target.id==='filtro-minhas-gestao'){ state.gestaoFiltro.somenteMinhas = e.target.checked; renderKanbanBoard(); }
  if(e.target.id==='filtro-operacao-global'){ state.operacaoAtual = e.target.value; renderContent(); }
  if(e.target.id==='filtro-categoria-produtos'){ state.produtosCategoria = e.target.value; renderTabelaProdutosBody(); }
  if(e.target.id==='arquivo-importacao'){
    const file = e.target.files[0];
    if(file) handleArquivoSelecionado(file);
  }
});

document.addEventListener('input', (e)=>{
  if(e.target.id==='busca-produtos-tab'){ state.produtosBusca = e.target.value; renderTabelaProdutosBody(); }
  if(e.target.id==='busca-produto-nova'){ state.formNova.busca = e.target.value; renderResultadosBuscaNova(); }
  if(e.target.id==='busca-gestao'){ state.gestaoFiltro.busca = e.target.value; renderKanbanBoard(); }
});

function highlightNav(){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-tab="${state.tab}"]`);
  if(active) active.classList.add('active');
}
function triggerFileInput(){
  let input = document.getElementById('arquivo-importacao');
  if(!input){
    input = document.createElement('input');
    input.type='file'; input.id='arquivo-importacao'; input.accept='.xlsx,.xls,.csv'; input.style.display='none';
    document.body.appendChild(input);
  }
  input.value='';
  input.click();
}

/* ===================== BOOTSTRAP ===================== */
async function bootstrapApp(){
  document.getElementById('app').innerHTML = `<div style="padding:60px;text-align:center;color:var(--muted);">Carregando...</div>`;
  await refreshData({force:true});
  initRealtime();
  render();
}
(function init(){
  if(!SUPABASE_URL || SUPABASE_URL.indexOf('COLE_AQUI')===0 || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf('COLE_AQUI')===0){
    renderConfigPendente();
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const saved = sessionStorage.getItem('sessao_estoque_puxada');
  if(saved){
    try{ state.session = JSON.parse(saved); }catch(err){ state.session = null; }
  }
  if(state.session) bootstrapApp();
  else render();
})();
</script>
